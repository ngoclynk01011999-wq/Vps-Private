name: 🖥️ WINDOWS RDP NATIVE (TAILSCALE CHÍNH CHỦ + CHROME)

on:
  workflow_dispatch:
    inputs:
      tailscale_key:
        description: "🔑 Tailscale Auth Key:"
        required: true
        default: "tskey-auth-kRVu78TGJn11CNTRL-yrfYH4vWGz6fCkFQveR2z6axLDLrVpHP5"

permissions:
  contents: read

jobs:
  native-windows:
    name: "Native Windows RDP"
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: 🛡️ Toi uu hoa He Thong (Tat Defender & Firewall)
        shell: powershell
        run: |
          Write-Host "Dang don dep tuong lua va Defender cho muot..."
          Set-MpPreference -DisableRealtimeMonitoring $true
          Set-NetFirewallProfile -Profile Domain,Public,Private -Enabled False

      - name: 👤 Cau hinh Tai khoan RDP
        shell: cmd
        run: |
          echo Dang dat lai mat khau cho tai khoan he thong...
          net user runneradmin ngoc0102@

      - name: 🔓 Mo khoa Remote Desktop (RDP)
        shell: powershell
        run: |
          Write-Host "Dang bat tinh nang Remote Desktop..."
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1

      - name: 🦎 Ket noi mang Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ github.event.inputs.tailscale_key }}

      - name: 📱 LAY THONG TIN KET NOI RDP
        shell: powershell
        run: |
          $rdp_ip = tailscale ip -4
          Write-Host "====================================================="
          Write-Host "  NATIVE WINDOWS DA SAN SANG SU DUNG (TAILSCALE)"
          Write-Host "====================================================="
          Write-Host "  IP Tailscale   : $rdp_ip"
          Write-Host "  Tai khoan      : runneradmin"
          Write-Host "  Mat khau       : ngoc0102@"
          Write-Host "====================================================="

      - name: ⏰ Giu Ket Noi He Thong (6 Tieng)
        shell: powershell
        run: |
          Write-Host "Dang duy tri phien lam viec Native qua Tailscale..."
          $timeout = 360 * 60
          $interval = 300
          $elapsed = 0
          while ($elapsed -lt $timeout) {
              Start-Sleep -Seconds $interval
              $elapsed += $interval
              Write-Host "May chu van dang hoat dong em ai... ($($elapsed/60) / 360 phut)"
          }
