name: 🖥️ WINDOWS RDP CÁ NHÂN (SIÊU SẠCH + CHROME)

on:
  workflow_dispatch:
    inputs:
      os_version:
        description: "📀 Select Operating System"
        required: true
        default: "Windows 10 Professional (4vCPU | 8GB RAM)"
        type: choice
        options:
          - "Windows 10 Professional (4vCPU | 8GB RAM)"

permissions:
  contents: read

jobs:
  windows-rdp:
    name: "Windows Personal RDP"
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: 🔧 Initializing Clean Windows System
        run: |
          set -e
          sudo apt-get update > /dev/null 2>&1

          echo "🔄 Setting up pure Windows environment..."
          VERSION="10"
          
          # --- BÙA TỰ ĐỘNG CÀI GOOGLE CHROME ---
          mkdir -p oem
          cat > oem/install.bat <<'BAT'
          @echo off
          echo [OEM] Dang tai va cai dat Google Chrome ngam...
          curl -L -o "C:\OEM\ChromeSetup.exe" "https://dl.google.com/chrome/install/latest/chrome_installer.exe"
          start /wait "" "C:\OEM\ChromeSetup.exe" /silent /install
          echo [OEM] Cai dat Chrome hoan tat!
          BAT

          # Cấu hình máy ảo Windows nguyên bản (Đã nối cáp ổ OEM)
          cat > docker-compose.yml <<EOF
          version: "3.9"
          services:
            windows:
              image: dockurr/windows
              container_name: windows_rdp
              privileged: true
              environment:
                VERSION: "$VERSION"
                USERNAME: "user"
                PASSWORD: "ngoc0102@"
                RAM_SIZE: "8G"
                CPU_CORES: "4"
                DISK_SIZE: "60G"
              devices:
                - /dev/kvm
              ports:
                - "3389:3389"
                - "8006:8006"
              volumes:
                - ./oem:/oem
          EOF

          # Khởi động Docker ngầm
          docker compose up -d > /dev/null 2>&1

          # Tải và kích hoạt Kami Tunnel mở đường hầm RDP/Web
          wget -q https://github.com/kami2k1/tunnel/releases/latest/download/kami-tunnel-linux-amd64.tar.gz
          tar -xzf kami-tunnel-linux-amd64.tar.gz > /dev/null 2>&1
          chmod +x kami-tunnel

          nohup ./kami-tunnel 3389 > kami_tunnel_rdp.log 2>&1 &
          echo "RDP Tunnel PID: $!"
          sleep 5
          nohup ./kami-tunnel 8006 > kami_tunnel_web.log 2>&1 &
          echo "Web Tunnel PID: $!"

      - name: 🌐 LẤY THÔNG TIN ĐĂNG NHẬP
        run: |
          echo "🔄 Đang lấy địa chỉ IP kết nối..."
          echo ""

          echo "⏳ Waiting for RDP tunnel (Port 3389)..."
          RDP_IP=""
          RDP_RETRY=0

          while [ -z "$RDP_IP" ] && [ $RDP_RETRY -lt 60 ]; do
            if [ -f kami_tunnel.txt ]; then
              RDP_CONTENT=$(cat kami_tunnel.txt 2>/dev/null | head -1)
              if [[ "$RDP_CONTENT" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+:[0-9]+$ ]]; then
                RDP_IP="$RDP_CONTENT"
                break
              fi
            fi
            sleep 2
            RDP_RETRY=$((RDP_RETRY + 1))
          done

          if [ -z "$RDP_IP" ]; then
            echo "❌ ERROR: Could not retrieve RDP IP"
            exit 1
          fi

          echo "⏳ Waiting for Web Viewer tunnel (Port 8006)..."
          sleep 3

          WEB_IP=""
          WEB_RETRY=0

          while [ -z "$WEB_IP" ] && [ $WEB_RETRY -lt 60 ]; do
            if [ -f kami_tunnel.txt ]; then
              WEB_CONTENT=$(cat kami_tunnel.txt 2>/dev/null | tail -1)
              if [[ "$WEB_CONTENT" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+:[0-9]+$ ]] && [ "$WEB_CONTENT" != "$RDP_IP" ]; then
                WEB_IP="$WEB_CONTENT"
                break
              fi
            fi
            sleep 2
            WEB_RETRY=$((WEB_RETRY + 1))
          done

          if [ -z "$WEB_IP" ]; then
            BASE_IP="${RDP_IP%:*}"
            WEB_IP="${BASE_IP}:8006"
          fi

          echo ""
          echo "╔═══════════════════════════════════════════════════════════════════════╗"
          echo "║ ✅ WINDOWS 10 PRO - ĐÃ SẴN SÀNG SỬ DỤNG                               ║"
          echo "╠═══════════════════════════════════════════════════════════════════════╣"
          echo "║ 🌐  Kết nối RDP    : $RDP_IP                                         ║"
          echo "║ 👤  Tài khoản      : user                                            ║"
          echo "║ 🔐  Mật khẩu       : ngoc0102@                                       ║"
          echo "║ 🌍  Xem trên Web   : http://$WEB_IP                                  ║"
          echo "╚═══════════════════════════════════════════════════════════════════════╝"
          echo ""

          echo "RDP_IP=$RDP_IP" >> $GITHUB_ENV
          echo "WEB_IP=$WEB_IP" >> $GITHUB_ENV

      - name: ⏰ Giữ Kết Nối (6 Tiếng)
        run: |
          echo ""
          echo "🟢 Session started - Đang duy trì máy chủ..."
          echo ""

          for i in {1..72}; do
            ELAPSED=$((i * 5))
            REMAINING=$((360 - ELAPSED))

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🟢 [$(date +'%Y-%m-%d %H:%M:%S')] MÁY CHỦ ĐANG HOẠT ĐỘNG"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "⏱️  Thời gian đã chạy : ${ELAPSED} phút"
            echo "⏳  Thời gian còn lại : ${REMAINING} phút"
            echo "🖥️  RDP Connection    : $RDP_IP"
            echo "🌐  Web Viewer        : http://$WEB_IP"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""

            sleep 300
          done
